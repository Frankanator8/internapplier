<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>InternApplier Autofill</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-width: 280px;
        margin: 0;
        padding: 14px 16px;
        background: #ffffff;
        color: #1f2937;
      }
      h1 { font-size: 14px; margin: 0 0 10px; }
      .status { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 8px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #9ca3af; }
      .dot.ok { background: #10b981; }
      .dot.err { background: #ef4444; }
      .name { font-size: 13px; margin-bottom: 12px; color: #374151; }
      button {
        width: 100%;
        padding: 8px 10px;
        font-size: 13px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover { background: #1d4ed8; }
      button:disabled { background: #9ca3af; cursor: not-allowed; }
      button.secondary {
        background: #ffffff;
        color: #374151;
        border: 1px solid #d1d5db;
      }
      button.secondary:hover { background: #f3f4f6; }
      .stack > * + * { margin-top: 8px; }
      .result { font-size: 12px; margin-top: 8px; color: #6b7280; min-height: 1em; }
      .hidden { display: none; }
      label.field { display: block; font-size: 11px; color: #6b7280; margin-bottom: 2px; }
      .row { margin-bottom: 8px; }
      .row input, .row select, .row textarea {
        width: 100%;
        box-sizing: border-box;
        font-size: 12px;
        padding: 6px 8px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        font-family: inherit;
      }
      .row textarea { min-height: 90px; resize: vertical; }
      .row .row-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 2px;
      }
      .pick-btn {
        width: auto;
        padding: 2px 8px;
        font-size: 11px;
        background: #ffffff;
        color: #2563eb;
        border: 1px solid #2563eb;
        border-radius: 4px;
        cursor: pointer;
      }
      .pick-btn:hover { background: #eff6ff; }
      .form-actions { display: flex; gap: 8px; }
      .form-actions button { flex: 1; }
      .section {
        margin-top: 14px;
        padding-top: 10px;
        border-top: 1px solid #e5e7eb;
      }
      .section-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #6b7280;
        margin-bottom: 8px;
      }
      details.tree {
        font-size: 12px;
        margin: 2px 0;
        padding-left: 4px;
      }
      details.tree > summary {
        cursor: pointer;
        padding: 2px 0;
        color: #374151;
        user-select: none;
      }
      details.tree > summary:hover { color: #2563eb; }
      .tree-body {
        padding: 4px 0 4px 12px;
        border-left: 1px solid #e5e7eb;
        margin-left: 4px;
      }
      .chip {
        display: inline-block;
        max-width: 100%;
        padding: 3px 8px;
        margin: 2px 4px 2px 0;
        background: #eff6ff;
        color: #1e3a8a;
        border: 1px solid #bfdbfe;
        border-radius: 10px;
        font-size: 11px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        cursor: grab;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        vertical-align: middle;
      }
      .chip:active { cursor: grabbing; }
      .chip-label {
        display: inline-block;
        font-family: -apple-system, sans-serif;
        color: #6b7280;
        margin-right: 4px;
      }
      .chip-row {
        display: flex;
        align-items: baseline;
        margin: 2px 0;
        gap: 4px;
      }
      .chip-row .field-name {
        font-size: 10px;
        color: #6b7280;
        min-width: 70px;
        flex-shrink: 0;
      }
      .answer-card {
        border: 1px solid #d1d5db;
        border-radius: 6px;
        padding: 8px;
        margin-bottom: 8px;
        background: #f9fafb;
        font-size: 12px;
      }
      .answer-card .question {
        font-weight: 600;
        color: #374151;
        margin-bottom: 4px;
        font-size: 11px;
      }
      .answer-card .answer-text {
        color: #1f2937;
        white-space: pre-wrap;
        cursor: grab;
        padding: 4px;
        background: #ffffff;
        border: 1px dashed #d1d5db;
        border-radius: 4px;
        max-height: 200px;
        overflow-y: auto;
      }
      .answer-card .answer-text:active { cursor: grabbing; }
      .answer-card .answer-actions {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }
      .answer-card .answer-actions button {
        width: auto;
        padding: 3px 8px;
        font-size: 11px;
      }
      .answer-card .spinner {
        color: #6b7280;
        font-style: italic;
      }
      .scan-toolbar {
        display: flex;
        gap: 6px;
        align-items: center;
        margin: 6px 0 8px;
      }
      .scan-toolbar button {
        width: auto;
        padding: 3px 8px;
        font-size: 11px;
      }
      .scan-summary { font-size: 12px; color: #374151; flex: 1; }
      #scan-list {
        max-height: 360px;
        overflow-y: auto;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
        padding: 4px;
      }
      .scan-row {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        padding: 4px 4px;
        font-size: 12px;
        border-bottom: 1px solid #f3f4f6;
      }
      .scan-row:last-child { border-bottom: none; }
      .scan-row.dup { opacity: 0.55; }
      .scan-row input[type=checkbox] { margin-top: 3px; flex-shrink: 0; }
      .scan-row .scan-main { flex: 1; min-width: 0; }
      .scan-row .scan-title {
        color: #1f2937;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .scan-row .scan-sub {
        font-size: 10px;
        color: #6b7280;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .scan-row .badge {
        font-size: 10px;
        background: #fef3c7;
        color: #92400e;
        border: 1px solid #fde68a;
        border-radius: 8px;
        padding: 1px 6px;
        flex-shrink: 0;
        align-self: center;
      }
    </style>
  </head>
  <body>
    <div id="main-view">
      <h1>InternApplier Autofill</h1>
      <div class="status">
        <span id="dot" class="dot"></span>
        <span id="status-text">Checking server…</span>
      </div>
      <div id="name" class="name"></div>
      <div class="stack">
        <div class="row" style="margin-bottom: 0;">
          <label class="field" for="load-target">Application</label>
          <select id="load-target"></select>
        </div>
        <button id="load-btn" disabled>Autofill Application</button>
        <button id="create-btn" class="secondary" disabled>Make New Application</button>
        <button id="ask-btn" class="secondary" disabled>Ask AI about a question on page</button>
        <button id="scan-btn" class="secondary" disabled>Scan page for jobs</button>
      </div>
      <div id="result" class="result"></div>

      <div id="answers-section" class="section hidden">
        <div class="section-title">AI Answers</div>
        <div id="answers-list"></div>
      </div>

      <div id="profile-section" class="section hidden">
        <div class="section-title">Profile — drag fields into the page</div>
        <div id="profile-tree"></div>
      </div>
    </div>

    <div id="scan-view" class="hidden">
      <h1>Scan page for jobs</h1>
      <div class="scan-toolbar">
        <span id="scan-summary" class="scan-summary">Scanning…</span>
      </div>
      <div id="scan-scope" class="scan-toolbar hidden" style="font-size: 11px; color: #6b7280;">
        <span style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
          Scoped to: <code id="scan-scope-selector"></code>
        </span>
        <button id="scan-scope-clear" class="secondary" type="button">Clear</button>
      </div>
      <div class="scan-toolbar">
        <button id="scan-pick" class="secondary" type="button">Pick a section</button>
        <button id="scan-select-new" class="secondary" type="button">Select all new</button>
        <button id="scan-deselect" class="secondary" type="button">Deselect all</button>
      </div>
      <div id="scan-list"></div>
      <div class="form-actions" style="margin-top: 10px;">
        <button id="scan-back" class="secondary">Back</button>
        <button id="scan-add">Add Selected</button>
      </div>
      <div id="scan-result" class="result"></div>
    </div>

    <div id="form-view" class="hidden">
      <h1>New Application</h1>
      <div class="row">
        <div class="row-header">
          <label class="field" for="f-company">Company</label>
          <button class="pick-btn" type="button" data-pick-field="company">Pick from page</button>
        </div>
        <input id="f-company" type="text">
      </div>
      <div class="row">
        <div class="row-header">
          <label class="field" for="f-role">Role</label>
          <button class="pick-btn" type="button" data-pick-field="role">Pick from page</button>
        </div>
        <input id="f-role" type="text">
      </div>
      <div class="row">
        <div class="row-header">
          <label class="field" for="f-date">Date Applied</label>
          <button class="pick-btn" type="button" data-pick-field="date">Pick from page</button>
        </div>
        <input id="f-date" type="text" placeholder="YYYY-MM-DD">
      </div>
      <div class="row">
        <div class="row-header">
          <label class="field" for="f-link">Link</label>
          <button class="pick-btn" type="button" data-pick-field="link">Pick from page</button>
        </div>
        <input id="f-link" type="text">
      </div>
      <div class="row">
        <label class="field" for="f-status">Status</label>
        <select id="f-status"></select>
      </div>
      <div class="row">
        <div class="row-header">
          <label class="field" for="f-notes">Notes</label>
          <button class="pick-btn" type="button" data-pick-field="notes">Pick from page</button>
        </div>
        <input id="f-notes" type="text">
      </div>
      <div class="row">
        <div class="row-header">
          <label class="field" for="f-description">Job Description</label>
          <button class="pick-btn" type="button" data-pick-field="description">Pick from page</button>
        </div>
        <textarea id="f-description"></textarea>
      </div>
      <div class="form-actions">
        <button id="cancel-btn" class="secondary">Cancel</button>
        <button id="save-btn">Save</button>
      </div>
      <div id="form-result" class="result"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
